name: DevSecOps Build & Deploy (api)

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: daffa09/emobo-ecommerce-api
  IMAGE_VERSION: 1.0.31

jobs:
  # ==========================================
  # NODE 1: SAST & SCA SCANNING
  # ==========================================
  sast-scan:
    name: 🕵️‍♂️ SAST & SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout source
        uses: actions/checkout@v4

      - name: 🕵️‍♂️ Scan Code & Dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # NODE 2: BUILD & PUSH IMAGE
  # ==========================================
  build-and-push:
    name: 🐳 Build & Push Image
    needs: sast-scan # Ini yang bikin garis penghubung dari Node 1 ke Node 2
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout source
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            ENV_FILE_CONTENT=${{ secrets.ENV_FILE_CONTENT }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

  # ==========================================
  # NODE 3: CONTAINER SECURITY SCAN
  # ==========================================
  image-scan:
    name: 🛡️ Container Security Scan
    needs: build-and-push # Garis penghubung dari Node 2 ke Node 3
    runs-on: ubuntu-latest
    steps:
      - name: 🐳 Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ==========================================
  # NODE 4: DEPLOYMENT
  # ==========================================
  deploy:
    name: 🚀 Deploy API Zero Downtime
    needs: image-scan # Baru deploy kalau image-nya aman dari scan
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to Fanthom Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/skripsi
            docker compose pull api
            docker compose up -d --scale api=2 --no-recreate api
            echo "⏳ Waiting for API to boot..."
            sleep 15
            docker compose up -d --scale api=1 api
            docker compose exec -T gateway nginx -s reload
            docker image prune -f

  # ==========================================
  # NODE 5: DAST SCANNING
  # ==========================================
  dast-scan:
    name: ⚡ Dynamic Security Test (ZAP)
    needs: deploy # Baru di-scan setelah berhasil live
    runs-on: ubuntu-latest
    steps:
      - name: ⚡ Dynamic Security Test (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'https://skripsi-api.daffathan-labs.my.id'